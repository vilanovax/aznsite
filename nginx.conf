# کانفیگ nginx برای سرو سایت استاتیک آزموده کاران
server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # ---- فشرده‌سازی ----
    gzip              on;
    gzip_vary         on;
    gzip_min_length   256;
    gzip_comp_level   6;
    gzip_types        text/plain text/css application/javascript application/json
                      image/svg+xml application/xml application/rss+xml application/atom+xml
                      font/woff2;

    # ---- هدرهای امنیتی (در همه پاسخ‌ها) ----
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=(), payment=()" always;
    add_header Content-Security-Policy    "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'; object-src 'none'; upgrade-insecure-requests" always;
    # HSTS فقط زمانی معنا دارد که پشت TLS (HTTPS) سرو شود
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ---- دارایی‌های هش‌دار و تغییرناپذیر: کش بلندمدت ----
    # (توجه: add_header در location، هدرهای سرور را بازنویسی می‌کند؛ پس مهم‌ها تکرار می‌شوند)
    location /_astro/ {
        add_header Cache-Control          "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # ---- مسیرهای تمیز (Astro خروجی /page/index.html می‌سازد) ----
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # ---- صفحه ۴۰۴ سفارشی ----
    error_page 404 /404.html;
}
